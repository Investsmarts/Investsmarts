<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Public Announcements — TrustDollar</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
:root {
  --green:#00c853;
  --green-dark:#00bfa5;
  --bg:#f2f5f9;
  --card:#fff;
  --muted:#777;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:#222;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.header {
  background:#ffffff;   /* white background */
  color:#222;           /* soft black text */
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:none;      /* shadow removed */
  border-bottom:1px solid #eee; /* optional soft line */
}

.header h1 {
  margin:0;
  font-size:18px;
  letter-spacing:0.5px;
  color:#111;           /* darker title */
}
.container {
  max-width:720px;
  width:92%;
  margin:15px auto;
  flex:1;
  overflow:hidden;
}
/* ===== Announcement Card ===== */
.announce-card {
  background:linear-gradient(135deg,#ffffff,#f7f7f7);
  border-left:4px solid var(--green);
  border-radius:6px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  padding:16px 18px;
  transition:0.3s;
}
.announce-card:hover {
  transform:translateY(-3px);
}
.announce-title {
  font-weight:700;
  color:var(--green-dark);
  font-size:16px;
}
.announce-msg {
  color:#444;
  margin-top:8px;
  font-size:14px;
  line-height:1.6;
}
.announce-date {
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
}

/* ===== Empty State ===== */
.empty {
  background:var(--card);
  border-radius:5px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  padding:24px;
  text-align:center;
  color:#888;
  font-size:15px;
  font-weight:500;
  margin-top:20px;
}

/* Responsive */
@media(max-width:480px) {
  .announce-title{font-size:15px;}
  .announce-msg{font-size:13px;}
}

/* Scrollable announcement box */

/* Scrollable announcement box */

/* Scrollable announcement box */

.scroll-box{
  height:calc(100vh - 140px); /* header space minus */
  overflow-y:auto;
  padding-top:10px;
  padding-bottom:10px;
  scroll-behavior:smooth;
}

/* smooth scrollbar */

.scroll-box::-webkit-scrollbar{
  width:4px;
}

.scroll-box::-webkit-scrollbar-thumb{
  background:#ccc;
  border-radius:10px;
}

#announcementList{
  display:flex;
  flex-direction:column;
  gap:12px;
  animation:scrollAnnouncements 20s linear infinite;
}

.scroll-box:hover #announcementList{
  animation-play-state:paused;
}

@keyframes scrollAnnouncements{
  0%{
    transform:translateY(0);
  }
  100%{
    transform:translateY(-50%);
  }
}
.announce-count{
  font-size:14px;
  font-weight:600;
  color:#333;
  margin-bottom:12px;
}

.header{
  padding:14px 16px;
  background:#f5f5f5;
}

.back-btn{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:18px;
  cursor:pointer;
}

.back-btn i{
  font-size:22px;
}

.title-box{
  padding:18px 16px 10px;
  background:#e9edf2;
}

.title-box h1{
  font-size:22px;
  margin:0;
  font-weight:600;
}

.announce-count{
  margin-top:6px;
  font-size:16px;
  color:#555;
  font-weight:500;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="back-btn" onclick="location.href='account.html'">
    <i class='bx bx-left-arrow-alt'></i>
    <span>Back</span>
  </div>
</div>

<!-- Title Section -->
<div class="title-box">
  <h1>Public Announcements</h1>
  <div class="announce-count" id="announceCount">2 Announcements</div>
</div>

<div class="container">
  <div class="scroll-box">
    <div id="announcementList">
      <div class="empty">📭 No Public Announcements Yet</div>
    </div>
  </div>
</div>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ✅ Firebase Config (same as your other pages)
  const firebaseConfig = {
    apiKey: "AIzaSyDEQYPJFxQv8yFHptrTqoLHOn2L0PpgVhc",
    authDomain: "btcinvest-c0e25.firebaseapp.com",
    projectId: "btcinvest-c0e25",
    storageBucket: "btcinvest-c0e25.firebasestorage.app",
    messagingSenderId: "204937458487",
    appId: "1:204937458487:web:cc27ece1249999279f60b2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const listContainer = document.getElementById("announcementList");
const countBox = document.getElementById("announceCount");
  // 🔥 Public Collection Listener
  const q = query(collection(db, "publicAnnouncements"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {

    listContainer.innerHTML = "";
      let total = snapshot.size;
  countBox.innerText = total + " Announcements";
    if (snapshot.empty) {
      listContainer.innerHTML = `<div class="empty">📭 No Public Announcements Yet</div>`;
      return;
    }

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const title = data.title || "Announcement";
      const message = data.message || "";
      const createdAt = data.createdAt ? formatDate(data.createdAt) : "Unknown Date";

      const card = document.createElement("div");
      card.className = "announce-card";
      card.innerHTML = `
        <div class="announce-title">📢 ${title}</div>
        <div class="announce-msg">${message}</div>
        <div class="announce-date">🕒 ${createdAt}</div>
      `;
      listContainer.appendChild(card);
    });
  }, (error) => {
    console.error("Error loading announcements:", error);
    listContainer.innerHTML = `<div class="empty">⚠️ Unable to load announcements. Check Firestore access.</div>`;
  });

  function formatDate(ts){
    if(!ts) return "";
    try {
      const d = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
      return d.toLocaleString();
    } catch {
      return "";
    }
  }
  </script>

</body>
</html>
