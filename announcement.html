<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Public Announcements — TrustDollar</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
:root {
  --green:#00c853;
  --green-dark:#00bfa5;
  --bg:#f2f5f9;
  --card:#fff;
  --muted:#777;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Poppins',sans-serif;
background:var(--bg);
color:#222;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* ===== Header ===== */

.header{
background:#ffffff;
color:#222;
padding:14px 20px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #eee;
}

.header h1{
margin:0;
font-size:18px;
letter-spacing:0.5px;
color:#111;
}

.container{
max-width:720px;
width:92%;
margin:15px auto;
flex:1;
overflow:hidden;
}

/* ===== NEW Announcement Card (App Style Like Image) ===== */

.announce-card{
background:#fff;
border-radius:8px;
padding:14px 16px;
box-shadow:0 2px 6px rgba(0,0,0,0.12);
position:relative;
transition:0.2s;
}

.announce-card:hover{
transform:translateY(-2px);
}

.announce-card::before{
content:"★";
position:absolute;
top:0;
left:0;
background:#0a7c63;
color:#fff;
font-size:11px;
padding:4px 6px;
border-top-left-radius:8px;
border-bottom-right-radius:8px;
}

.announce-title{
font-size:15px;
font-weight:600;
margin-bottom:6px;
color:#222;
}

.announce-msg{
font-size:14px;
line-height:1.5;
color:#333;
margin-bottom:10px;
}

.announce-footer{
display:flex;
justify-content:space-between;
align-items:center;
font-size:12px;
color:#777;
flex-wrap:wrap;
gap:8px;
}

.attach{
display:flex;
align-items:center;
gap:5px;
}

.attach i{
font-size:14px;
}

.author{
font-size:12px;
color:#555;
}

/* ===== Empty State ===== */

.empty{
background:var(--card);
border-radius:5px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
padding:24px;
text-align:center;
color:#888;
font-size:15px;
font-weight:500;
margin-top:20px;
}

/* ===== Responsive ===== */

@media(max-width:480px){
.announce-title{font-size:15px;}
.announce-msg{font-size:13px;}
}

/* ===== Scroll Box ===== */

.scroll-box{
height:calc(100vh - 140px);
overflow-y:auto;
padding-top:10px;
padding-bottom:10px;
scroll-behavior:smooth;
}

.scroll-box::-webkit-scrollbar{
width:4px;
}

.scroll-box::-webkit-scrollbar-thumb{
background:#ccc;
border-radius:10px;
}

#announcementList{
display:flex;
flex-direction:column;
gap:12px;
}

.scroll-box:hover #announcementList{
animation-play-state:paused;
}

@keyframes scrollAnnouncements{
0%{transform:translateY(0);}
100%{transform:translateY(-50%);}
}

.announce-count{
font-size:14px;
font-weight:600;
color:#333;
margin-bottom:12px;
}

/* ===== Back Button ===== */

.header{
padding:14px 16px;
background:#f5f5f5;
}

.back-btn{
display:flex;
align-items:center;
gap:8px;
font-size:18px;
cursor:pointer;
}

.back-btn i{
font-size:22px;
}

/* ===== Title Section ===== */

.title-box{
padding:18px 16px 10px;
background:#e9edf2;
}

.title-box h1{
font-size:22px;
margin:0;
font-weight:600;
}

.announce-count{
margin-top:6px;
font-size:16px;
color:#555;
font-weight:500;
}

/* ===== Notification Box ===== */

#notifyBox{
position:fixed;
bottom:-200px;
left:20px;
right:20px;
background:#fff;
padding:18px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
z-index:9999;
font-family:Poppins;
border:1px solid #eee;
transition:0.4s ease;
}

#notifyBox.show{
bottom:20px;
}

.notify-title{
font-size:16px;
font-weight:600;
color:#00c853;
margin-bottom:6px;
}

.notify-text{
font-size:14px;
color:#555;
line-height:1.5;
margin-bottom:12px;
}

.notify-btn{
background:#00c853;
border:none;
color:#fff;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:14px;
box-shadow:0 4px 10px rgba(0,200,83,0.3);
}

/* ===== Notify Alert ===== */

#notifyAlert{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
background:#00c853;
color:#fff;
padding:14px 22px;
border-radius:10px;
font-weight:600;
font-size:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
opacity:0;
transition:0.3s;
z-index:10000;
}

#notifyAlert.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.announcement-text{
font-size:14px;
line-height:1.7;
color:#444;
font-family: 'Segoe UI', Tahoma, sans-serif;
margin-top:8px;
}

.announcement-text p{
margin-bottom:10px;
}
</style>
</head>
<body>


<!-- Header -->
<div class="header">
  <div class="back-btn" onclick="location.href='account.html'">
    <i class='bx bx-left-arrow-alt'></i>
    <span>Back</span>
  </div>
</div>

<!-- Title Section -->
<div class="title-box">

  <div class="announce-count" id="announceCount"> Announcements</div>
</div>

<div class="container">
  <div class="scroll-box">
    <div id="announcementList">
      <div class="empty">📭 No Public Announcements Yet</div>
    </div>
  </div>
</div>
  <script type="module">


  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ✅ Firebase Config (same as your other pages)
  const firebaseConfig = {
    apiKey: "AIzaSyDEQYPJFxQv8yFHptrTqoLHOn2L0PpgVhc",
    authDomain: "btcinvest-c0e25.firebaseapp.com",
    projectId: "btcinvest-c0e25",
    storageBucket: "btcinvest-c0e25.firebasestorage.app",
    messagingSenderId: "204937458487",
    appId: "1:204937458487:web:cc27ece1249999279f60b2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const listContainer = document.getElementById("announcementList");
const countBox = document.getElementById("announceCount");
  // 🔥 Public Collection Listener
  const q = query(collection(db, "publicAnnouncements"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {

 listContainer.innerHTML = "";
      let total = snapshot.size;
  countBox.innerText = total + " Announcements";
    if (snapshot.empty) {
      listContainer.innerHTML = `<div class="empty">📭 No Public Announcements Yet</div>`;
      return;
    }

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const title = data.title || "Announcement";
      const message = data.message || "";
      const createdAt = data.createdAt ? formatDate(data.createdAt) : "Unknown Date";

      const card = document.createElement("div");
      card.className = "announce-card";
      card.innerHTML = `
        <div class="announce-title">📢 ${title}</div>
        <div class="announce-msg">${message}</div>
        <div class="announce-date">🕒 ${createdAt}</div>
      `;
      listContainer.appendChild(card);
    });
  }, (error) => {
    console.error("Error loading announcements:", error);
    listContainer.innerHTML = `<div class="empty">⚠️ Unable to load announcements. Check Firestore access.</div>`;
  });

  function formatDate(ts){
    if(!ts) return "";
    try {
      const d = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
      return d.toLocaleString();
    } catch {
      return "";
    }
  }


  </script>
<script type="module">

import { startNotifications } from "./messaging.js";

// 🔧 ensure service worker ready
if ('serviceWorker' in navigator) {
  await navigator.serviceWorker.ready;
}

window.enableNotifications = async function(){

 await startNotifications();

 localStorage.setItem("notifyEnabled","true");

 showNotify("Notifications Enabled ✅");

 document.getElementById("notifyBox").style.display="none";

}

</script>
<script>

window.addEventListener("load",()=>{

 if(localStorage.getItem("notifyEnabled")==="true"){
   return;
 }

 setTimeout(()=>{
  document.getElementById("notifyBox").classList.add("show");
 },500);

});

function showNotify(text){

 const alertBox = document.getElementById("notifyAlert");

 alertBox.innerText = text;

 alertBox.classList.add("show");

 setTimeout(()=>{
  alertBox.classList.remove("show");
 },2000);

}
</script>
</body>
</html>
